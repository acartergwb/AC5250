name: Release

# On a version tag (v*), build a Velopack installer + update packages and publish
# them to a GitHub Release. Cut a release with:
#     git tag v2.0.0 && git push origin v2.0.0
# Users download Setup.exe ONCE; the app then auto-updates on launch from these
# releases (see Program.cs UpdateOnLaunch + docs.velopack.io).

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write           # create the release and upload assets

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Version from tag (strip leading v)
        id: ver
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}" -replace '^v', ''
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # Self-contained, but NOT single-file: Velopack packages the published folder and
      # computes delta updates from it.
      - name: Publish
        shell: pwsh
        run: >
          dotnet publish src/AC5250.App/AC5250.App.csproj
          -c Release -r win-x64 --self-contained true -o publish
          -p:Version=${{ steps.ver.outputs.version }}

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      # Pull the previous release so vpk can build a small delta package. Harmless (and
      # skipped) on the first Velopack release, which has no prior packages.
      - name: Download previous release (for deltas)
        continue-on-error: true
        run: vpk download github --repoUrl https://github.com/${{ github.repository }} --token ${{ secrets.GITHUB_TOKEN }}

      - name: Pack
        run: vpk pack -u AC5250 -v ${{ steps.ver.outputs.version }} -p publish -e AC5250.exe --packTitle "AC5250" --icon src/AC5250.App/AC5250.ico

      - name: Upload to GitHub Release
        run: >
          vpk upload github
          --repoUrl https://github.com/${{ github.repository }}
          --publish
          --releaseName "AC5250 ${{ github.ref_name }}"
          --tag ${{ github.ref_name }}
          --token ${{ secrets.GITHUB_TOKEN }}
